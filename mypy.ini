[mypy]
# Минимальная конфигурация — постепенное внедрение типов на legacy-кодбейзе.
# Сейчас только проверяем что код парсится и нет очевидных type-mismatches.
# Strict-режим включить когда покроем основные модули типами.
python_version = 3.12
ignore_missing_imports = True
follow_imports = silent
warn_unused_ignores = False
warn_redundant_casts = True
no_implicit_optional = True
check_untyped_defs = False
disallow_untyped_defs = False

# Строже на новый/чувствительный код
[mypy-bot.onboarding]
check_untyped_defs = True

[mypy-bot.services.stt]
check_untyped_defs = True

[mypy-backend.app.services.task_list_detector]
check_untyped_defs = True

# SQLAlchemy и aiogram — много динамики, не трогаем
[mypy-sqlalchemy.*]
ignore_errors = True

[mypy-aiogram.*]
ignore_errors = True
