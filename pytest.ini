[pytest]
# Bot и backend тесты — разные пакеты, conftest'ы не должны конфликтовать.
# importmode=importlib даёт каждому модулю уникальный путь без shared package.
asyncio_mode = auto
addopts = -ra --import-mode=importlib -m "not integration"
testpaths = tests backend/tests
markers =
    integration: tests requiring live Postgres+Redis (run: pytest -m integration)
